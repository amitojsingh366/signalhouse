    # --- Broad Market ETFs (CAD-hedged) ---
    etfs:
      - {symbol: "XSP.TO",   name: "iShares S&P 500 CAD-hedged"}
      - {symbol: "ZQQ.TO",   name: "BMO NASDAQ-100 CAD-hedged"}
      - {symbol: "ZSP.TO",   name: "BMO S&P 500 CAD-hedged"}
