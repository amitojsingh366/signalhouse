  # Diversification limits
  max_sector_pct: 0.40  # Max 40% of portfolio in one sector

  # Signal parameters
  momentum:
    fast_period: 10
    slow_period: 30
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70

  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    lookback_days: 60

  # Holding period
  min_hold_days: 2
  max_hold_days: 7

risk:
  max_position_pct: 0.30      # Max 30% of portfolio in one position
  max_positions: 5             # Max simultaneous positions
  stop_loss_pct: 0.05          # 5% hard stop loss
  trailing_stop_pct: 0.03      # 3% trailing stop
  take_profit_pct: 0.08        # 8% gain → take profit (full sell)
  tighten_stop_at_pct: 0.05    # 5% gain → tighten trailing stop to 1.5%
  tightened_trail_pct: 0.015   # Trailing stop after tighten threshold
  max_daily_loss_pct: 0.08     # 8% max daily drawdown, halt trading
  max_total_drawdown_pct: 0.20 # 20% max total drawdown, halt all trading

notifications:
  min_strength: 0.40           # Only notify for signals >= 40% strength
  retry_delay_seconds: 30      # Wait before retry attempt
  max_retries: 1               # Try once more if not acknowledged
  cooldown_minutes: 60         # Don't re-notify same symbol within this window

schedule:
  # Eastern Time
  market_open: "09:30"
  market_close: "16:00"
  premarket_start: "08:00"
  scan_interval_minutes: 15  # Check signals every 15 min during market hours
