      - {symbol: "XQQ.TO",   name: "iShares NASDAQ-100 CAD-hedged"}

  # Diversification limits
  max_sector_pct: 0.40  # Max 40% of portfolio in one sector

  # Signal parameters
  momentum:
    fast_period: 10
    slow_period: 30
    rsi_period: 14
    rsi_oversold: 30
    rsi_overbought: 70

  mean_reversion:
    bb_period: 20
    bb_std: 2.0
    lookback_days: 60

  # Holding period
  min_hold_days: 2
  max_hold_days: 7

risk:
  max_position_pct: 0.50      # Max 50% of portfolio in one position
  max_positions: 2             # Max simultaneous positions
  stop_loss_pct: 0.05          # 5% hard stop loss
  trailing_stop_pct: 0.03      # 3% trailing stop
  max_daily_loss_pct: 0.08     # 8% max daily drawdown, halt trading
  max_total_drawdown_pct: 0.20 # 20% max total drawdown, halt all trading

schedule:
  # Eastern Time
  market_open: "09:30"
  market_close: "16:00"
  premarket_start: "08:00"
  scan_interval_minutes: 15  # Check signals every 15 min during market hours
