# Trading Recommendation Bot Configuration
# Copy to settings.local.yaml and fill in your secrets

discord:
  bot_token: ""      # Discord bot token (override via DISCORD_BOT_TOKEN env var)
  channel_id: ""     # Channel ID where bot posts (override via DISCORD_CHANNEL_ID)
  guild_id: ""       # Server ID for slash command sync (override via DISCORD_GUILD_ID)

anthropic:
  api_key: ""        # For Claude vision screenshot parsing (override via ANTHROPIC_API_KEY)

