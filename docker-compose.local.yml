# Local development override — keep Caddy enabled and expose it to localhost.
# Usage: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
services:
  caddy:
    # Replace base caddy port bindings (80/443) to avoid privileged/conflicting
    # host ports in local development.
    ports: !override
      - "${CADDY_LOCAL_HTTP_PORT:-3000}:80"
    # Replace the production Caddyfile with a local-only HTTP config that
    # preserves host:port access (no implicit HTTPS redirect/domain rewrites).
    volumes: !override
      - ./Caddyfile.local:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
