services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:latest
    restart: unless-stopped
    environment:
      TWS_USERID: ${IBKR_USERNAME}
      TWS_PASSWORD: ${IBKR_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      TWS_SETTINGS_PATH: /home/ibgateway/Jts
    ports:
      - "4002:4002"  # Paper trading API
      - "4001:4001"  # Live trading API
      - "5900:5900"  # VNC (optional, for debugging)
    volumes:
      - ib-gateway-data:/home/ibgateway/Jts

  trader:
    build: .
    restart: unless-stopped
    # Share IB Gateway's network so we connect as localhost (trusted)
    network_mode: "service:ib-gateway"
    volumes:
      - ./config:/app/config:ro
      - ./logs:/app/logs

volumes:
  ib-gateway-data:
