services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-trader}
      POSTGRES_DB: trader
    volumes:
      - pgdata:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ./api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://trader:${POSTGRES_PASSWORD:-trader}@postgres:5432/trader}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - APNS_KEY_PATH=${APNS_KEY_PATH:-/app/config/AuthKey.p8}
      - APNS_KEY_ID=${APNS_KEY_ID:-}
      - APNS_TEAM_ID=${APNS_TEAM_ID:-}
      - APNS_BUNDLE_ID=${APNS_BUNDLE_ID:-}
      - APNS_SANDBOX=${APNS_SANDBOX:-false}
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - DOMAIN=${DOMAIN:-localhost}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-signalhouse}
      - WEBAUTHN_EXPECTED_ORIGINS=${WEBAUTHN_EXPECTED_ORIGINS:-}
    volumes:
      - ./config:/app/config:ro
    expose:
      - "8000"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://trader:${POSTGRES_PASSWORD:-trader}@postgres:5432/trader}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_CHANNEL_ID=${DISCORD_CHANNEL_ID}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./config:/app/config:ro

  web:
    build:
      context: ./web
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - api
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - PORT=${WEB_PORT:-3000}
    expose:
      - "${WEB_PORT:-3000}"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
      - api
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    environment:
      - APPLE_TEAM_ID=${APNS_TEAM_ID:-XXXXXXXXXX}
      - DOMAIN=${DOMAIN:-localhost}
      - WEB_PORT=${WEB_PORT:-3000}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  pgdata:
  caddy_data:
  caddy_config:
